<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>YEARSAGO - CHECKOUT</title>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet" />
</head>
<body id="page-top">
    <a class="menu-toggle rounded" href="#"><i class="fas fa-bars"></i></a>
    <nav id="sidebar-wrapper">
        <ul class="sidebar-nav">
            <li class="sidebar-brand"><a href="index.html">YEARSAGO</a></li>
            <li class="sidebar-nav-item"><a href="index.html">HOME</a></li>
            <li class="sidebar-nav-item"><a href="about.html">BRAND STORY</a></li>
            <li class="sidebar-nav-item"><a href="lookbook.html">LOOKBOOK</a></li>
            <li class="sidebar-nav-item"><a href="collection.html">COLLECTION</a></li>
            <li class="sidebar-nav-item"><a href="cart.html">CART</a></li>
            <li class="sidebar-nav-item"><a href="contact.html">SHOWROOM</a></li>
        </ul>
    </nav>
    <section class="content-section bg-white" style="padding-top: 10rem;">
        <div class="container px-4 px-lg-5">
            <h2 class="mb-5 text-center" style="letter-spacing: 2px;">CHECKOUT</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form action="order_complete.html" method="GET">
                        <h4 class="mb-4 border-bottom pb-2">1. 배송지 정보</h4>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">이름</label>
                                <input type="text" class="form-control rounded-0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">연락처</label>
                                <input type="tel" class="form-control rounded-0" placeholder="010-0000-0000" required>
                            </div>
                        </div>
                        <div class="mb-5">
                            <label class="form-label">주소</label>
                            <input type="text" class="form-control rounded-0 mb-2" placeholder="기본 주소" required>
                            <input type="text" class="form-control rounded-0" placeholder="상세 주소">
                        </div>
                        <h4 class="mb-4 border-bottom pb-2">2. 결제 수단</h4>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payment" id="pay1" checked>
                            <label class="form-check-label" for="pay1">신용카드 결제</label>
                        </div>
                        <div class="form-check mb-5">
                            <input class="form-check-input" type="radio" name="payment" id="pay2">
                            <label class="form-check-label" for="pay2">무통장 입금</label>
                        </div>
                        <button type="submit" class="btn btn-dark btn-xl w-100">결제하기 (PAY NOW)</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer text-center bg-light mt-5">
        <div class="container px-4 px-lg-5">
            <p class="text-muted small mb-0">Copyright &copy; DK 2026. All Rights Reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
