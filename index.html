<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" text="width=device-width, initial-scale=1.0">
    <title>김광균 - 은수저</title>
    <style>
        @font-face {
            font-family: 'SongamLeeHyeongSik';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/SongamIhyeongsik-Regular.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111118;
            color: #e0e0e6;
            font-family: 'SongamLeeHyeongSik', '맑은 고딕', sans-serif;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 60px auto;
            padding: 50px 30px;
            background-color: #1b1c26;
            border-radius: 12px;
            border: 1px solid #2a2b3d;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            color: #f3e9dc;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .author {
            font-size: 1.2rem;
            color: #a8a8b3;
            margin-bottom: 40px;
        }

        .text {
            font-size: 1.25rem;
            color: #d1d1d6;
        }

        .text p {
            margin: 0 0 40px 0;
        }

        .text p:last-child {
            margin-bottom: 0;
        }

        @media screen and (max-width: 480px) {
            .container {
                width: 95%;
                margin: 30px auto;
                padding: 40px 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .author {
                margin-bottom: 30px;
            }
            .text {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>은수저</h1>
        
        <div class="author">김광균</div>
        
        <div class="text">
            <p>
                산이 저문다.<br>
                노을이 잠긴다.<br>
                저녁 밥상에 애기가 없다.<br>
                애기 앉던 방석에 한 쌍의 은수저<br>
                은수저 끝에 눈물이 고인다.
            </p>
            <p>
                한 밤중에 바람이 분다.<br>
                바람 속에서 애기가 웃는다.<br>
                애기는 방 속을 들여다 본다.<br>
                들창을 열었다 다시 닫는다.
            </p>
            <p>
                먼 들길을 애기가 간다.<br>
                맨발 벗은 애기가 울면서 간다.<br>
                불러도 대답이 없다.<br>
                그림자마저 아른거린다.
            </p>
        </div>
    </div>
</body>
</html>
